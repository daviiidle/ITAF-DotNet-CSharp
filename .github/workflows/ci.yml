name: ITAF CI

on:
  schedule:
    - cron: "0 20 * * *"
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ITAF-DotNet-CSharp.sln

      - name: Build
        run: dotnet build ITAF-DotNet-CSharp.sln --configuration Release --no-restore

      - name: Start mock API
        run: |
          python3 scripts/mock_api.py &
          sleep 2
          curl --fail http://localhost:4020/health

      - name: Test
        run: ITAF_ENVIRONMENT=ci dotnet test ITAF-DotNet-CSharp.sln --configuration Release --no-build --filter "FullyQualifiedName~ITAF.Tests.Ci.MockApiSmokeTests" --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/TestResults/*.trx
            reports/**
