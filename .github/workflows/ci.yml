name: ITAF CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ITAF-DotNet-CSharp.sln

      - name: Build
        run: dotnet build ITAF-DotNet-CSharp.sln --configuration Release --no-restore

      - name: Install Playwright browsers
        run: pwsh tests/ITAF.Tests/bin/Release/net8.0/playwright.ps1 install --with-deps chromium

      - name: Test
        run: dotnet test ITAF-DotNet-CSharp.sln --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/TestResults/*.trx
            reports/**

